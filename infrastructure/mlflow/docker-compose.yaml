services:
  postgres:
    image: postgres:16
    container_name: mlflow-postgres
    hostname: mlflow-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - mlflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mlflow:
    build:
      context: .
    container_name: mlflow-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: mlflow-postgres
      POSTGRES_PORT: 5432
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@mlflow-postgres:5432/${POSTGRES_DB}
      MLFLOW_ARTIFACT_ROOT: /mlartifacts
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - mlflow-artifacts:/mlartifacts

volumes:
  mlflow-postgres-data:
  mlflow-artifacts:
